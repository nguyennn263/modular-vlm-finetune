# VietVLM-Finetune Model Configuration
model:
  name: "VinternVLM"
  
  vision_tower:
    model_name: "OpenGVLab/InternViT-300M-448px"
    image_size: 448
    patch_size: 14
    hidden_size: 1024
    freeze: true
    
  projector:
    input_dim: 1024
    output_dim: 2048
    
  llm:
    model_name: "Qwen/Qwen2-1.5B-Instruct"
    max_length: 2048
    
  dynamic_resolution:
    max_tiles: 12
    tile_size: 448
    min_tiles: 1

# LoRA Configuration
lora:
  enabled: true
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  
# Training Configuration  
training:
  gradient_checkpointing: true
  use_flash_attention: true
  bf16: true
  
# Special tokens
special_tokens:
  image_token: "<image>"
  image_token_id: 151667
