model:
  # Vision Encoder: "internvit", "siglip", "clip"
  vision_encoder_type: "internvit"
  vision_model_name: "OpenGVLab/InternViT-300M-448px"
  vision_hidden_size: 1024
  image_size: 448
  
  # Projector: "mlp", "mlp_gelu", "linear", "downsample"
  projector_type: "mlp"
  
  # LLM: "qwen2-0.5b", "qwen2-1.5b", "qwen2-7b", "phi-2", "vinallama-2.7b"
  llm_type: "qwen2-0.5b"
  # Override model name (optional)
  # llm_model_name: "Qwen/Qwen2-0.5B-Instruct"
  
  # Freeze settings
  freeze_vision: false  # Full finetune vision
  freeze_llm: true      # Use LoRA for LLM
  
  # Memory optimization
  use_flash_attention: false  
  torch_dtype: "float16"      # "float16" or "bfloat16"

lora:
  enabled: true
  r: 32                    # Reduced for T4
  alpha: 64
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

data:
  train_path: "data/train.json"
  val_path: "data/val.json"
  image_dir: "data/images"
  max_length: 1024         # Reduced for T4
  max_tiles: 6             # Reduced for T4

training:
  # Basic
  epochs: 3
  batch_size: 1            # Small batch for T4
  gradient_accumulation: 8
  
  # Optimizer
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  scheduler: "cosine"
  
  # Memory optimization
  gradient_checkpointing: true
  mixed_precision: "fp16"
  
  # Logging
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  
  # W&B (disable on Kaggle to save quota)
  use_wandb: false

output:
  dir: "outputs"
  save_total_limit: 2

checkpoint:
  enabled: true
  save_strategy: "steps"       # "steps", "epoch", "best"
  save_steps: 100               # Save every N steps (if strategy is "steps")
  save_total_limit: 3           # Max checkpoints to keep
  save_best: true               # Save best model based on metric
  metric_for_best: "eval_loss"  # Metric to track ("eval_loss", "eval_accuracy")
  greater_is_better: false      # True if higher metric is better
  resume_from_checkpoint: null  # Path to checkpoint, "latest", or null
  save_optimizer: true          # Save optimizer state
  save_scheduler: true          # Save scheduler state
