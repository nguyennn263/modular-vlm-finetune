name: bridge_training_comparison
description: "Training comparison: 5 bridge architectures + Full Vintern Freeze baseline"

# Output configuration
output_dir: "outputs/training"
resume: true

# Training configuration
training:
  include_no_bridge: true   # Baseline: Full Vintern Freeze (freeze all)
  
# Training configuration (per experiment)
num_epochs: 10
batch_size: 8
learning_rate: 2e-4
weight_decay: 0.01

# Early stopping
early_stopping: true
patience: 3
min_delta: 0.0001

# Evaluation
eval_steps: 100
save_steps: 500

# Device
device: "auto"  # auto | cuda | cpu

# Seed for reproducibility
seed: 42
