name: bridge_training_comparison
description: "Bridge Training Ablation: Compare 5 bridge architectures + Linear Bridge (Exp 6)"

# Output configuration
output_dir: "outputs/training"
resume: true

# Bridge Training Comparison
# Trains 6 different bridge modules (only bridge trainable, vision+language frozen)
training:
  include_linear_bridge: true   # Exp 6: Linear - minimal Linear(1024→896) bridge
  
# Training configuration (per experiment)
num_epochs: 10
batch_size: 8
learning_rate: 2e-4
weight_decay: 0.01

# Early stopping
early_stopping: true
patience: 3
min_delta: 0.0001

# Evaluation
eval_steps: 500
save_steps: 500

# Device
device: "auto"  # auto | cuda | cpu

# Seed for reproducibility
seed: 42
