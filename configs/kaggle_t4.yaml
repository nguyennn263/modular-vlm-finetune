model:
  vision_encoder_type: "internvit"
  vision_model_name: "OpenGVLab/InternViT-300M-448px"
  vision_hidden_size: 1024
  image_size: 448
  
  projector_type: "mlp"
  
  llm_type: "qwen2-0.5b"
  
  freeze_vision: false
  freeze_llm: true
  
  use_flash_attention: false
  torch_dtype: "float16"

lora:
  enabled: true
  r: 16              
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj" 
    - "v_proj"
    - "o_proj"

data:
  train_path: "data/train.json"
  val_path: "data/val.json"
  image_dir: "data/images"
  max_length: 512    
  max_tiles: 4       

training:
  epochs: 3
  batch_size: 1
  gradient_accumulation: 16
  
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  scheduler: "cosine"
  
  gradient_checkpointing: true
  mixed_precision: "fp16"
  
  logging_steps: 5
  eval_steps: 50
  save_steps: 50
  
  use_wandb: false

output:
  dir: "/kaggle/working/outputs"
  save_total_limit: 1
